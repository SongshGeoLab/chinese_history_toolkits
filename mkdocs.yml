site_name: Chinese History Toolkits
site_description: Bidirectional Chinese-history time mapping with a transparent cleaning pipeline
site_author: SongshGeo
site_url: https://songshgeolab.github.io/chinese_history_toolkits/
docs_dir: docs
site_dir: site

repo_name: SongshGeoLab/chinese_history_toolkits
repo_url: https://github.com/SongshGeoLab/chinese_history_toolkits
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 SongshGeo

# Note: nav entries reference the *default-language* filenames (no suffix).
# The mkdocs-static-i18n plugin automatically resolves the per-language
# variant (e.g. `index.zh.md`) when building each language's site.
nav:
  - Home: index.md
  - Quick Start: doc/quick-start.md
  - Data Pipeline: doc/data-pipeline.md
  - API Reference: doc/api-reference.md
  - Epochs Reference: doc/epochs.md

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  # mkdocs-static-i18n drives a real language switcher: one build, two
  # locales served at / (en, default) and /zh/ (zh). Per-page localized
  # files are picked up by suffix (`index.zh.md`, `doc/quick-start.zh.md`,
  # ...). When a translation is missing for a page, the plugin falls back
  # to the default-language version (config below).
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: 中国历史工具集
          nav_translations:
            Home: 主页
            Quick Start: 快速开始
            Data Pipeline: 数据流水线
            API Reference: API 参考
            Epochs Reference: 历史时期参考

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SongshGeoLab/chinese_history_toolkits
